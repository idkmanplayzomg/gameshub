<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Unavailable</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
        color: white;
    }

    .container {
        max-width: 800px;
        width: 90%;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .warning-icon {
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #ff4d4d;
    }

    h1 {
        font-size: 2.2rem;
        color: #ff4d4d;
        margin-bottom: 15px;
    }

    p {
        font-size: 1.1rem;
        line-height: 1.7;
        color: #e0e0e0;
        margin-bottom: 20px;
    }

    .gallery {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 25px;
    }

    .gallery img {
        width: 180px;
        height: 120px;
        object-fit: cover;
        border-radius: 12px;
        border: 2px solid rgba(255,255,255,0.15);
        transition: transform 0.3s;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    .footer {
        margin-top: 25px;
        font-size: 0.9rem;
        color: #bdbdbd;
    }
</style>
</head>
<body>

<div class="container">

    <img
        class="warning-icon"
        src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=300"
        alt="Warning">

    <h1>Game Currently Unavailable</h1>

    <p>
        Sorry, this game is currently removed due to political and child-safety concerns.
        Access has been disabled while the situation is reviewed.
    </p>

    <p>
        Please check back later for updates regarding availability.
    </p>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400" alt="Game image">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400" alt="Game image">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400" alt="Game image">
    </div>

    <div class="footer">
        © 2026 Chuonky — Status Page
    </div>

</div>

</body>
</html>
