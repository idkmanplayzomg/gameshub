<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHUONKY</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
}

/* HEADER */
header {
    padding: 14px;
    background: #111827;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
    font-size: 20px;
    color: #00ff99;
}

input {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #00ff99;
    background: black;
    color: #00ff99;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    padding: 14px;
}

/* CARD */
.card {
    background: #111827;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 110px;
    object-fit: cover;
    background: #0f172a;
}

.card-title {
    padding: 10px;
    text-align: center;
    font-size: 14px;
}

/* BADGE */
.badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: red;
    color: white;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 6px;
}

/* GAME VIEW */
iframe {
    width: 100%;
    height: 90vh;
    border: none;
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>🎮 CHUONKY</h1>
    <input id="search" placeholder="Search games..." oninput="render()">
</header>

<div class="grid" id="grid"></div>

<iframe id="frame"></iframe>

<script>
const games = [
"1v1lol","2048","adarkroom","asciispace","asteroids","astray","backcountry",
"baldisbasics","basketballlegends","basketballstars","basketbrosio","basketrandom",
"bitlife","bounceback","boxingrandom","breakout","btd4","chess","chromedino",
"cookieclicker","crossyroad","cubefield","cuttherope","deathrun3d","doodlejump",
"doom","drift","drifthunters","drivemad","ducklife","ducklife2","ducklife3",
"ducklife4","ducklife5","earntodie","eggycar","evilglitch","flappybird",
"fruitninja","geometrydash","googlesnake","grindcraft","hextris","highwaytraffic",
"learntofly","littlealchemy","monkeymart","motox3m","ovo","pacman","paperio",
"q1k3","r3","retrobowl","run3","slitherio","slope","slope2","snake","stack",
"stackball","stickman-hook","stickmangolf","subwaysurfers","tetris","tunnelrush",
"vex3","vex4","vex5","vex6","zombsroyale",
"minecraft",
"five-nights-at-epstein"
];

function getImg(name){
    // try PNG first
    let img = `images/${name}.png`;
    return img;
}

function isNew(name){
    return name === "minecraft" || name === "five-nights-at-epstein";
}

function openGame(name){
    document.getElementById("grid").style.display = "none";
    let frame = document.getElementById("frame");
    frame.style.display = "block";
    frame.src = `gfiles/${name}/index.html`;
}

function render(){
    let grid = document.getElementById("grid");
    let search = document.getElementById("search").value.toLowerCase();

    grid.innerHTML = "";

    games
    .filter(g => g.toLowerCase().includes(search))
    .forEach(name => {

        let card = document.createElement("div");
        card.className = "card";

        let img = document.createElement("img");

        // fallback system
        img.src = getImg(name);
        img.onerror = () => {
            img.src = "images/placeholder.png";
        };

        let title = document.createElement("div");
        title.className = "card-title";
        title.innerText = name;

        card.onclick = () => openGame(name);

        if(isNew(name)){
            let badge = document.createElement("div");
            badge.className = "badge";
            badge.innerText = "NEW";
            card.appendChild(badge);
        }

        card.appendChild(img);
        card.appendChild(title);
        grid.appendChild(card);
    });
}

render();
</script>

</body>
</html>
