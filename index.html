<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>

<style>
:root{
    --bg:#080b12;
    --card:#131826;
    --card2:#1a2031;
    --accent:#00ff99;
    --accent2:#00c3ff;
    --text:#ffffff;
    --muted:#8a94a6;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,Segoe UI,Arial,sans-serif;
    background:radial-gradient(circle at top,#162034 0%,#080b12 70%);
    color:white;
    min-height:100vh;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(20px);
    background:rgba(8,11,18,.85);
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 24px;
}

header h1{
    margin:0;
    font-size:28px;
    background:linear-gradient(
        90deg,
        var(--accent),
        var(--accent2)
    );
    -webkit-background-clip:text;
    color:transparent;
}

#search{
    width:280px;
    max-width:50vw;
    padding:12px 16px;
    border:none;
    border-radius:14px;
    background:#111827;
    color:white;
    outline:none;
}

#search:focus{
    box-shadow:0 0 0 2px var(--accent);
}

.hero{
    padding:40px 24px 10px;
}

.hero h2{
    margin:0;
    font-size:42px;
}

.hero p{
    margin-top:10px;
    color:var(--muted);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:18px;
    padding:24px;
}

.card{
    position:relative;
    overflow:hidden;
    background:linear-gradient(
        180deg,
        var(--card2),
        var(--card)
    );
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    cursor:pointer;
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    display:block;
}

.card::after{
    content:"▶ PLAY";
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.65);
    opacity:0;
    transition:.2s;
    font-weight:700;
}

.card:hover::after{
    opacity:1;
}

.card-title{
    padding:14px;
    text-align:center;
    font-weight:600;
    text-transform:capitalize;
}

.footer{
    text-align:center;
    color:var(--muted);
    padding:30px;
}

@media(max-width:700px){

    header{
        flex-direction:column;
        gap:12px;
    }

    #search{
        width:100%;
        max-width:none;
    }

    .hero h2{
        font-size:30px;
    }

    .grid{
        grid-template-columns:
            repeat(auto-fill,minmax(160px,1fr));
    }
}
</style>
</head>

<body>

<header>
    <h1>Game Hub</h1>
    <input id="search" type="text" placeholder="Search games...">
</header>

<section class="hero">
    <h2>Play Instantly</h2>
    <p>Select a game to launch.</p>
</section>

<div class="grid" id="gameGrid"></div>

<div class="footer">
    Loaded from /gfiles/
</div>

<script>
const games = [
"1v1lol","2048","Five-Nights-at-Epstein","Minecraft",
"adarkroom","asciispace","assessmentexamination","asteroids",
"astray","backcountry","baldisbasics","basketballlegends",
"basketballstars","basketbrosio","basketrandom","bitlife",
"blackholesquare","bounceback","boxingrandom","breaklock",
"breakout","btd4","captaincallisto","chess",
"chromaincident","chromedino","clickerheroes","clusterrush",
"connect3","cookieclicker","crossyroad","csgoclicker",
"cubefield","cubitomayhem","cuttherope","cuttheropeholiday",
"cuttheropetimetravel","deathrun3d","deepestsword","doodlejump",
"doom","drawthehill","drift","drifthunters",
"drivemad","ducklife","ducklife2","ducklife3",
"ducklife4","ducklife5","earntodie","edgenotfound",
"eggycar","emulators","evilglitch","factoryballsforever",
"fireboyandwatergirlforesttemple","five-nights-at-epstien",
"flappy2048","flappybird","flappyplane","flightsimulator",
"fridaynightfunkin","friendlyfire","fruitninja","games",
"geometrydash","getawayshootoutnew","gladihoppers","googlesnake",
"gopherkart","grindcraft","hexgl","hextris",
"highwaytraffic","konnekt","learntofly","letssurf",
"littlealchemy","mergeroundracers","minecraft","monkeymart",
"motoroadrash3d","motox3m","ninjavsevilcorp","omnombounce",
"ovo","ovo2","packabunchas","pacman",
"paperio","particleclicker","pushback","q1k3",
"r3","racer","radiusraid","redball4",
"retrobowl","retrohaunt","riddleschool2","ritz",
"roadblocks","rooftopsnipers","run3","scrapmetal3",
"shuttledeck","sketchbook04","sleepingbeauty","slitherio",
"slope","slope2","snake","snowbattle",
"soccerrandom","solitaire","spacecompany","spacegarden",
"spacehuggers","spaceinvaders","stack","stackball",
"stickman-hook","stickmanboost","stickmanclimb","stickmangolf",
"stickmanhook","stickmansurvival","subwaysurfers",
"subwaysurfersny","subwaysurferssingapore","tanukisunset",
"tetris","themazeofspacegoblins","timeshooter",
"timeshooter2","timeshooter3","tinyfishing",
"tombofthemask","topspeedracing3d","towermaster",
"trimps","tunnelrush","vex3","vex4",
"vex5","vex6","webecomewhatwebehold",
"worldshardestgame2","xx142b2exe","zombsroyale"
];

const grid = document.getElementById("gameGrid");

games.sort().forEach(game => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img
            src="/images/${game}.png"
            alt="${game}"
            onerror="this.src='/images/placeholder.png'"
        >
        <div class="card-title">${game}</div>
    `;

    card.onclick = () => {
        window.location.href =
            "/gfiles/" + game + "/index.html";
    };

    grid.appendChild(card);
});

document.getElementById("search")
.addEventListener("input", e => {

    const term = e.target.value.toLowerCase();

    document.querySelectorAll(".card")
    .forEach(card => {

        const title =
            card.querySelector(".card-title")
            .textContent
            .toLowerCase();

        card.style.display =
            title.includes(term)
            ? ""
            : "none";
    });
});
</script>

</body>
</html>
